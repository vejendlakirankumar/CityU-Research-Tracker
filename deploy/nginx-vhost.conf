# /etc/nginx/sites-available/rrp-v2
#
# External Nginx reverse proxy for the RRP v2 Docker container.
# Handles SSL termination; proxies to rrp_app on localhost:80.
#
# Install:
#   sudo cp rrp-v2.conf /etc/nginx/sites-available/rrp-v2
#   sudo ln -s /etc/nginx/sites-available/rrp-v2 /etc/nginx/sites-enabled/rrp-v2
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace PORTAL_DOMAIN with the actual domain (e.g. portal.cityu.edu).

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name PORTAL_DOMAIN;

    # Let's Encrypt ACME challenge (needed by certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS vhost ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name PORTAL_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/PORTAL_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PORTAL_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (6 months; include subdomains only if you own them all)
    add_header Strict-Transport-Security "max-age=15768000" always;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/rrp-v2-access.log;
    error_log  /var/log/nginx/rrp-v2-error.log warn;

    # ── Upload size ───────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Proxy to Docker container (listening on host port PROXY_PORT) ─────────
    location / {
        proxy_pass         http://127.0.0.1:PROXY_PORT;
        proxy_http_version 1.1;

        # Pass real client IP so Laravel can log it and rate-limit correctly
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket support (Laravel Reverb)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Buffer settings — avoids nginx buffering slow PHP responses in RAM
        proxy_buffering    off;
    }
}
