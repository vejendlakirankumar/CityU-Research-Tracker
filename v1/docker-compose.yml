# ------------------------------------------------------------------ #
#  CityU Research Review Portal — Docker Compose
#
#  Quick start (dev):
#    cp .env.example .env          # first time only
#    make up                       # start containers
#    make init                     # first time only — installs WordPress
#
#  For a different server / public URL:
#    WP_URL=http://your-server.com WP_PORT=80 docker compose up -d
#    docker compose exec wordpress bash /usr/local/bin/docker-init.sh
# ------------------------------------------------------------------ #
services:

  # ── MySQL 8.0 ───────────────────────────────────────────────────── #
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      wordpress
      MYSQL_USER:          wp
      MYSQL_PASSWORD:      ${DB_PASSWORD:-wp_test_pass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "wp", "--password=${DB_PASSWORD:-wp_test_pass}"]
      interval: 10s
      timeout:  5s
      retries:  12

  # ── WordPress 6.7 · PHP 8.1 · Apache 2.4 ───────────────────────── #
  wordpress:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      # ── Database connection ──────────────────────────────────────── #
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_USER:     wp
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wp_test_pass}
      WORDPRESS_DB_NAME:     wordpress

      # ── Passed to scripts (docker-init.sh reads these) ──────────── #
      WP_URL:            ${WP_URL:-http://localhost:8080}
      WP_ADMIN_USER:     ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-Admin1234!}
      WP_ADMIN_EMAIL:    ${WP_ADMIN_EMAIL:-admin@test.com}

      # ── Written verbatim into wp-config.php by the WP entrypoint ── #
      # Docker Compose substitutes ${WP_URL} from .env at startup so  #
      # wp-config.php will contain the literal URL — no runtime lookup.#
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_HOME',    '${WP_URL:-http://localhost:8080}' );
        define( 'WP_SITEURL', '${WP_URL:-http://localhost:8080}' );
        define( 'WP_DEBUG',     false );
        define( 'WP_DEBUG_LOG', false );

    volumes:
      # WordPress core files persist across container restarts
      - wp_data:/var/www/html
      # Plugin folder is bind-mounted directly from the repo.
      # Code changes take effect immediately — no rebuild needed.
      - .:/var/www/html/wp-content/plugins/research-review-portal

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-login.php"]
      interval: 15s
      timeout:  5s
      retries:  12
      start_period: 30s

volumes:
  db_data:
  wp_data:
