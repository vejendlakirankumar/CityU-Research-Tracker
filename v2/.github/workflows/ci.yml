name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — PHPUnit (SQLite in-memory, no Postgres needed)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.4"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, pdo_pgsql, mbstring, xml, curl, zip, bcmath, intl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit
        run: php artisan test --parallel 2>/dev/null || php artisan test
        env:
          APP_ENV: testing
          APP_KEY: base64:verySecretTestKeyThatIs32BytesLong=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          MAIL_MAILER: log

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — TypeScript check + Vite build + Vitest
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vitest unit tests
        run: npm run test

      - name: Vite production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy — only on pushes to main, requires both jobs to pass
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy backend files
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PASS: ${{ secrets.VM_PASS }}
        run: |
          BACKEND_SRC="$GITHUB_WORKSPACE/backend"
          VM="${VM_USER}@${VM_HOST}"
          sshpass -p "$VM_PASS" scp -o StrictHostKeyChecking=no \
            "$BACKEND_SRC/routes/api.php" \
            "$VM:/tmp/"
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no "$VM" "
            docker cp /tmp/api.php rrp_app:/var/www/html/routes/api.php
            docker exec -w /var/www/html rrp_app php artisan migrate --force
            docker exec -w /var/www/html rrp_app php artisan route:cache
            docker exec -w /var/www/html rrp_app php artisan config:clear
          "

      - name: Deploy frontend
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PASS: ${{ secrets.VM_PASS }}
        run: |
          VM="${VM_USER}@${VM_HOST}"
          sshpass -p "$VM_PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            "$GITHUB_WORKSPACE/frontend/src/" \
            "$VM:/opt/rrp-v2/frontend-src/src/"
          sshpass -p "$VM_PASS" scp -o StrictHostKeyChecking=no \
            "$GITHUB_WORKSPACE/frontend/package.json" \
            "$GITHUB_WORKSPACE/frontend/tsconfig.json" \
            "$GITHUB_WORKSPACE/frontend/vite.config.ts" \
            "$VM:/opt/rrp-v2/frontend-src/"
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no "$VM" "
            docker run --rm -v /opt/rrp-v2/frontend-src:/app -w /app node:20-alpine \
              sh -c 'npm install && npm run build'
            docker cp /opt/rrp-v2/frontend-src/dist/. rrp_app:/var/www/frontend/
            docker exec rrp_app nginx -s reload
          "
