services:
  # ── Main application (PHP-FPM + Nginx in one container) ─────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rrp_app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      SECRETS_FROM_FILES: "false"
      # Credentials injected from host environment or .secrets file
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE:-rrp_production}
      DB_USERNAME: ${DB_USERNAME:-rrp_app}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:8080}
      FILESYSTEM_DISK: local
      RUN_MIGRATIONS: "true"
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rrp_net

  # ── Queue worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rrp_worker
    restart: unless-stopped
    command: >
      sh -c "php /var/www/html/artisan queue:work redis
             --sleep=3 --tries=3 --max-time=3600 --no-interaction"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE:-rrp_production}
      DB_USERNAME: ${DB_USERNAME:-rrp_app}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    networks:
      - rrp_net

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rrp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rrp_production}
      POSTGRES_USER: ${DB_USERNAME:-rrp_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rrp_app} -d ${DB_DATABASE:-rrp_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rrp_net

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rrp_redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
             then redis-server --requirepass "$$REDIS_PASSWORD";
             else redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rrp_net

volumes:
  pgdata:
  redis_data:
  app_storage:
  app_cache:

networks:
  rrp_net:
    driver: bridge
